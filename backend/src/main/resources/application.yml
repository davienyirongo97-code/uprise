server:
  port: ${PORT:8081}

spring:
  application:
    name: microfinance-backend
  
  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:microfinance_db}
    username: ${PGUSER:sa}
    password: ${PGPASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  
  h2:
    console:
      enabled: false
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    defer-datasource-initialization: true
  
  sql:
    init:
      mode: always
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: your-secret-key-change-this-in-production
  expiration: 86400000

app:
  storage:
    type: local
    local-path: ./uploads
