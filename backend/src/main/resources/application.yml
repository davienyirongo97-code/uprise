server:
  port: 8081

spring:
  application:
    name: microfinance-backend
  
  datasource:
    url: jdbc:h2:mem:microfinance_db
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    defer-datasource-initialization: true
  
  sql:
    init:
      mode: always
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: your-secret-key-change-this-in-production
  expiration: 86400000

app:
  storage:
    type: local
    local-path: ./uploads
