server:
  port: ${PORT:8081}

spring:
  application:
    name: microfinance-backend

  datasource:
    url: jdbc:h2:mem:microfinance_db
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET:aW50ZXJuYWxfand0X3NlY3JldF9rZXlfZm9yX3VwcmlzZV9taWNyb2ZpbmFuY2VfMjAyNl9wcm9kdWN0aW9u}
  expiration: 86400000

app:
  storage:
    type: local
    local-path: ./uploads
